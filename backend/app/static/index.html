<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraSight | Remote Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #E2E8F0; margin: 0; }
        .header { background-color: rgba(21, 26, 45, 0.8); backdrop-filter: blur(12px); padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 15px;}
        .logo { width: 35px; height: 35px; background: linear-gradient(135deg, #10B981, #06B6D4); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);}
        .header h2 { margin: 0; font-size: 1.3rem; font-weight: 600; }
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { background-color: #151A2D; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: 600;}
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px;}
        .HEALTHY { background-color: rgba(16, 185, 129, 0.2); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .WARNING { background-color: rgba(245, 158, 11, 0.2); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.3); }
        .CRITICAL { background-color: rgba(239, 68, 68, 0.2); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .score-container { display: flex; flex-direction: column; align-items: center; margin: 25px 0; }
        .score { font-size: 3rem; font-weight: 700; line-height: 1; }
        .score-label { font-size: 0.8rem; color: #94A3B8; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px;}
        .metric { margin: 15px 0; }
        .metric-label { font-size: 0.85rem; color: #94A3B8; margin-bottom: 8px; display: flex; justify-content: space-between;}
        .bar-bg { width: 100%; background-color: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease-out; }
        .cpu-fill { background-color: #3B82F6; }
        .ram-fill { background-color: #8B5CF6; }
        .disk-fill { background-color: #10B981; }
        .last-seen { font-size: 0.75rem; color: #64748B; text-align: right; margin-top: 20px; font-family: monospace;}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">IS</div>
        <h2>InfraSight Endpoint Intelligence</h2>
    </div>
    <div class="container">
        <div class="grid" id="endpoints-grid">
            <div style="color: #64748B">Awaiting telemetry data from agents...</div>
        </div>
    </div>
    <script>
        async function fetchEndpoints() {
            try {
                const res = await fetch('/api/v1/endpoints');
                const data = await res.json();
                const grid = document.getElementById('endpoints-grid');
                grid.innerHTML = '';
                
                if (data.length === 0) {
                    grid.innerHTML = '<div style="color: #64748B">No endpoints reporting telemetry yet. Start the agent.</div>';
                    return;
                }
                
                data.forEach(ep => {
                    let scoreColor = '#10B981'; // Healthy
                    if (ep.status === 'WARNING') scoreColor = '#F59E0B';
                    if (ep.status === 'CRITICAL') scoreColor = '#EF4444';

                    grid.innerHTML += `
                        <div class="card">
                            <h3>${ep.hostname} <span class="status ${ep.status}">${ep.status}</span></h3>
                            
                            <div class="score-container">
                                <div class="score" style="color: ${scoreColor}">${ep.health_score}</div>
                                <div class="score-label">Health Score</div>
                            </div>
                            
                            <div class="metric">
                                <div class="metric-label"><span>CPU Usage</span> <span>${ep.cpu_usage.toFixed(1)}%</span></div>
                                <div class="bar-bg"><div class="bar-fill cpu-fill" style="width: ${ep.cpu_usage}%"></div></div>
                            </div>
                            
                            <div class="metric">
                                <div class="metric-label"><span>RAM Usage</span> <span>${ep.ram_usage.toFixed(1)}%</span></div>
                                <div class="bar-bg"><div class="bar-fill ram-fill" style="width: ${ep.ram_usage}%"></div></div>
                            </div>
                            
                            <div class="metric">
                                <div class="metric-label"><span>Disk Usage</span> <span>${ep.disk_usage.toFixed(1)}%</span></div>
                                <div class="bar-bg"><div class="bar-fill disk-fill" style="width: ${ep.disk_usage}%"></div></div>
                            </div>
                            
                            <div class="last-seen">Last contact: ${new Date(ep.last_seen).toLocaleTimeString()}</div>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error fetching data", e); }
        }
        
        fetchEndpoints();
        setInterval(fetchEndpoints, 3000); // Fast refresh for live feel
    </script>
</body>
</html>
